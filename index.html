<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qixuan Xu</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --card-dark: rgba(255,255,255,0.08);
            --card-light: rgba(255,255,255,0.72);
            --border-dark: rgba(255,255,255,0.12);
            --border-light: rgba(15,23,42,0.08);
            --text-dark: #f8fafc;
            --text-light: #0f172a;
            --muted-dark: #cbd5e1;
            --muted-light: #334155;
            --glow-dark: rgba(99,102,241,0.25);
            --glow-light: rgba(79,140,255,0.16);
        }

        body {
            font-family: Arial, sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            transition: color 0.6s ease;
        }

        body.light {
            color: var(--text-light);
        }

        /* Performance optimized background layers */
        .bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            transition: opacity 1.2s ease;
            will-change: opacity;
        }

        .bg.dark {
            background:
                radial-gradient(circle at 20% 20%, rgba(79,140,255,0.18), transparent 28%),
                radial-gradient(circle at 80% 25%, rgba(139,92,246,0.14), transparent 24%),
                radial-gradient(circle at 50% 80%, rgba(56,189,248,0.12), transparent 30%),
                linear-gradient(135deg, #07111f, #0b1220 45%, #0f1e3d);
        }

        .bg.light {
            background:
                radial-gradient(circle at 20% 20%, rgba(79,140,255,0.10), transparent 28%),
                radial-gradient(circle at 80% 25%, rgba(139,92,246,0.08), transparent 24%),
                radial-gradient(circle at 50% 80%, rgba(56,189,248,0.08), transparent 30%),
                linear-gradient(135deg, #eef2ff, #e6ecff 45%, #e0e7ff);
            opacity: 0;
        }

        body.light .bg.light { opacity: 1; }
        body.light .bg.dark { opacity: 0; }

        /* Cursor glow */
        .cursor-glow {
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--glow-dark), transparent 60%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: background 0.5s ease;
            mix-blend-mode: screen;
        }

        body.light .cursor-glow {
            background: radial-gradient(circle, var(--glow-light), transparent 60%);
        }

        .container {
            width: min(1120px, 92%);
            margin: 0 auto;
            padding: 40px 0 80px;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .nav-links a {
            color: inherit;
            opacity: 0.7;
            text-decoration: none;
            margin-left: 18px;
            transition: 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .home-btn {
            background: linear-gradient(90deg, #4f8cff, #8b5cf6);
            padding: 9px 15px;
            border-radius: 12px;
            color: white !important;
            font-weight: bold;
            box-shadow: 0 10px 24px rgba(79,140,255,0.22);
        }

        /* Glass cards */
        .glass {
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            border-radius: 26px;
            backdrop-filter: blur(14px);
            padding: 28px;
            transition: background 0.6s ease, border 0.6s ease, transform 0.2s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.16);
        }

        body.light .glass {
            background: var(--card-light);
            border: 1px solid var(--border-light);
        }

        .glass:hover {
            transform: translateY(-4px) scale(1.01);
        }

        .hero {
            display: grid;
            grid-template-columns: 1.25fr 0.75fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 64px;
            margin-bottom: 10px;
        }

        p { opacity: 0.75; line-height: 1.6; }

        .section-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card { padding: 24px; }

        .footer {
            text-align: center;
            opacity: 0.5;
            margin-top: 40px;
            font-size: 14px;
        }

        .theme-toggle {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
            background: var(--card-dark);
            border: 1px solid var(--border-dark);
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, background 0.6s ease;
        }

        body.light .theme-toggle {
            background: var(--card-light);
            border: 1px solid var(--border-light);
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        @media (max-width: 900px) {
            .hero, .section-grid {
                grid-template-columns: 1fr;
            }

            h1 { font-size: 42px; }
        }
    </style>
</head>

<body>

<div class="bg dark"></div>
<div class="bg light"></div>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="container">
    <div class="nav">
        <div class="logo">QIXUAN.NET</div>
        <div class="nav-links">
            <a class="home-btn" href="https://home.qixuan.net">Home Panel</a>
            <a href="https://qixuan.net/files/">Files</a>
            <a href="https://qixuan.net/projects/">Projects</a>
        </div>
    </div>

    <div class="hero">
        <div class="glass">
            <h1>Qixuan Xu</h1>
            <p>FPV · Programming · AI · Aviation</p>
            <p>This site is my personal portfolio, file hub, and project space.</p>
        </div>

        <div class="glass">
            <h2>Quick Overview</h2>
            <p>Projects, files, and research.</p>
        </div>
    </div>

    <div class="section-grid">
        <div class="card glass"><h2>About Me</h2></div>
        <div class="card glass"><h2>Projects</h2></div>
        <div class="card glass"><h2>Contact</h2></div>
    </div>

    <div class="footer">© 2026 Qixuan Xu</div>
</div>

<div class="theme-toggle" id="themeToggle">🌙</div>

<script>
const glow = document.getElementById("cursorGlow");
const toggleBtn = document.getElementById("themeToggle");

window.addEventListener("mousemove", (e) => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

function applySavedTheme() {
    if (localStorage.getItem("mode") === "light") {
        document.body.classList.add("light");
        toggleBtn.innerText = "☀️";
    }
}
applySavedTheme();

// Smooth & fast theme toggle (performance optimized)
toggleBtn.addEventListener("click", () => {
    toggleBtn.style.transform = "scale(0.9)";
    setTimeout(() => toggleBtn.style.transform = "scale(1)", 120);

    document.body.classList.toggle("light");

    if (document.body.classList.contains("light")) {
        toggleBtn.innerText = "☀️";
        localStorage.setItem("mode", "light");
    } else {
        toggleBtn.innerText = "🌙";
        localStorage.setItem("mode", "dark");
    }
});
</script>

</body>
</html>
