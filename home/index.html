<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Qixuan OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<body>
<div id="lock-screen">
  <input type="password" id="pwd" placeholder="Enter password">
  <button onclick="unlock()">Unlock</button>
  <div id="lock-error"></div>
</div>

<div>
  <p>Status: <span id="status">Locked</span></p>
  <p>Projects: <span id="projects">Locked</span></p>
  <p>Notes: <span id="notes">Locked</span></p>
  <p>Files: <span id="files">Locked</span></p>
</div>

<script>
let TOKEN = null;

function setError(msg){
  document.getElementById("lock-error").innerText = msg || "";
}

async function unlock(){
  const pwd = document.getElementById("pwd").value.trim();

  if(!pwd){
    setError("Enter password");
    return;
  }

  const res = await fetch('/api/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:pwd})
  });

  if(res.status !== 200){
    setError("Wrong password");
    return;
  }

  const data = await res.json();
  TOKEN = data.token;
  localStorage.setItem('token', TOKEN);

  document.getElementById("lock-screen").style.display='none';
  loadData();
}

async function apiFetch(url){
  const token = localStorage.getItem('token');

  const res = await fetch(url,{
    headers:{
      'Authorization':'Bearer '+token
    }
  });

  if(res.status === 401){
    localStorage.removeItem('token');
    location.reload();
    return;
  }

  return res.json();
}

async function loadData(){
  try{
    const [db, status] = await Promise.all([
      apiFetch('/api/db'),
      apiFetch('/api/status')
    ]);

    document.getElementById('status').innerText = status.status;
    document.getElementById('projects').innerText = db.stats.projects;
    document.getElementById('notes').innerText = db.stats.notes;
    document.getElementById('files').innerText = db.stats.files;

  }catch(e){
    console.error(e);
  }
}

window.onload = ()=>{
  const token = localStorage.getItem('token');
  if(token){
    TOKEN = token;
    document.getElementById("lock-screen").style.display='none';
    loadData();
  }
}
</script>
</body>
</html>
