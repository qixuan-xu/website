<!-- 宇宙无敌超级牛逼版本v0.1 -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MC Panel — Login</title>
<link rel="icon" type="image/png" href="../favicon.png"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07111f;
  --card:rgba(255,255,255,0.045);
  --border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.14);
  --green:#40916c;
  --green2:#2d6a4f;
  --greentext:#74b89a;
  --greendim:#52796f;
  --text:#e8f0f8;
  --muted:rgba(200,220,240,0.5);
  --red:#e06c75;
  --accent:#4f8cff;
}
body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 55% 45% at 20% 30%, rgba(64,145,108,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 80% 70%, rgba(79,140,255,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 50%, rgba(45,106,79,0.07) 0%, transparent 70%),
    linear-gradient(160deg,#060e1c,#07111f 50%,#090f1a);
}
/* grid */
body::after{
  content:'';
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(64,145,108,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(64,145,108,0.04) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.wrap{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  padding:24px;
}

/* top label */
.top-label{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--greendim);
  letter-spacing:.12em;
  text-transform:uppercase;
  margin-bottom:28px;
  display:flex;align-items:center;gap:8px;
}
.top-label::before{
  content:'';
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px rgba(64,145,108,0.7);
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  backdrop-filter:blur(20px);
  padding:36px 32px;
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent 55%);
  pointer-events:none;
}

.card-header{margin-bottom:32px}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.logo-icon{
  width:40px;height:40px;border-radius:10px;
  background:rgba(45,106,79,0.4);
  border:1px solid rgba(64,145,108,0.3);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-icon svg{width:18px;height:18px;fill:none;stroke:#74b89a;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-title{font-size:18px;font-weight:700;letter-spacing:.01em}
.logo-sub{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--muted);
  margin-top:6px;
}

.field{margin-bottom:16px}
.field-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--greendim);
  text-transform:uppercase;letter-spacing:.1em;
  margin-bottom:8px;
  display:block;
}
.input-wrap{
  position:relative;
  display:flex;align-items:center;
}
.input-pre{
  position:absolute;left:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;color:var(--greentext);
  pointer-events:none;
  user-select:none;
}
input[type="password"]{
  width:100%;
  background:rgba(0,0,0,0.25);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 42px 12px 34px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  color:var(--text);
  outline:none;
  transition:border-color .2s,box-shadow .2s;
  caret-color:var(--greentext);
}
input[type="password"]:focus{
  border-color:rgba(64,145,108,0.5);
  box-shadow:0 0 0 3px rgba(64,145,108,0.08);
}
input[type="password"]::placeholder{color:rgba(255,255,255,0.18)}

.eye-btn{
  position:absolute;right:12px;
  background:none;border:none;cursor:pointer;
  padding:4px;color:var(--muted);
  transition:color .15s;
  display:flex;align-items:center;
}
.eye-btn:hover{color:var(--greentext)}
.eye-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}

.login-btn{
  width:100%;
  background:rgba(45,106,79,0.5);
  border:1px solid rgba(64,145,108,0.4);
  border-radius:10px;
  padding:13px;
  font-family:'Syne',sans-serif;
  font-size:14px;font-weight:600;
  color:#c8e6c9;
  cursor:pointer;
  transition:background .2s,border-color .2s,transform .12s;
  margin-top:8px;
  letter-spacing:.03em;
}
.login-btn:hover{
  background:rgba(64,145,108,0.55);
  border-color:rgba(64,145,108,0.6);
  transform:translateY(-1px);
}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-msg{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--red);
  margin-top:12px;
  min-height:16px;
  display:flex;align-items:center;gap:6px;
  opacity:0;transition:opacity .2s;
}
.error-msg.show{opacity:1}
.error-msg::before{content:'!';font-weight:700}

.bottom-link{
  margin-top:24px;
  text-align:center;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--muted);
}
.bottom-link a{
  color:var(--greendim);text-decoration:none;
  transition:color .15s;
}
.bottom-link a:hover{color:var(--greentext)}

/* entrance */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.wrap{animation:fadeUp .5s ease both}
</style>
</head>
<body>
<div class="wrap">
  <div class="top-label">mc.qixuan.net — secure access</div>
  <div class="card">
    <div class="card-header">
      <div class="logo-row">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        </div>
        <div class="logo-title">MC Panel</div>
      </div>
      <div class="logo-sub">qixuan.net / minecraft</div>
    </div>

    <div class="field">
      <label class="field-label" for="pw">Password</label>
      <div class="input-wrap">
        <span class="input-pre">›</span>
        <input type="password" id="pw" placeholder="enter password" autocomplete="current-password"/>
        <button class="eye-btn" id="eye-btn" type="button" tabindex="-1">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="login-btn" id="login-btn">Login</button>
    <div class="error-msg" id="err">Incorrect password</div>
  </div>

  <div class="bottom-link">
    <a href="../">← qixuan.net</a>
  </div>
</div>

<script>
const API = "https://api.mc.qixuan.net";

const pwInput = document.getElementById("pw");
const loginBtn = document.getElementById("login-btn");
const errMsg = document.getElementById("err");
const eyeBtn = document.getElementById("eye-btn");
const eyeIcon = document.getElementById("eye-icon");

let showPw = false;
eyeBtn.addEventListener("click", () => {
  showPw = !showPw;
  pwInput.type = showPw ? "text" : "password";
  eyeIcon.innerHTML = showPw
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

async function doLogin() {
  const pw = pwInput.value.trim();
  if (!pw) return;
  loginBtn.disabled = true;
  loginBtn.textContent = "Verifying...";
  errMsg.classList.remove("show");

  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({password: pw})
    });
    const data = await res.json();
    if (res.ok && data.token) {
      sessionStorage.setItem("mc_token", data.token);
      window.location.href = "panel.html";
    } else {
      errMsg.textContent = data.error || "Incorrect password";
      errMsg.classList.add("show");
      pwInput.value = "";
      pwInput.focus();
    }
  } catch(e) {
    errMsg.textContent = "Cannot reach server";
    errMsg.classList.add("show");
  }

  loginBtn.disabled = false;
  loginBtn.textContent = "Login";
}

loginBtn.addEventListener("click", doLogin);
pwInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

// redirect if already logged in
if (sessionStorage.getItem("mc_token")) {
  window.location.href = "panel.html";
}
</script>
</body>
</html>
